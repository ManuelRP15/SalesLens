<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>STI dev harness</title>
    <style>
      body { font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; background: #f3f2f2; color: #16325c; }
      /* A deliberately Lightning-shaped page: a sticky global header, a sticky
         highlights panel, a tall body, and a nested scroll container — the exact
         four things DECISIONS.md #61/#62's scroll correction has to survive. */
      .global-header { position: fixed; top: 0; left: 0; right: 0; height: 48px; background: #16325c; color: #fff;
                       display: flex; align-items: center; padding: 0 16px; z-index: 10; }
      .highlights { position: sticky; top: 48px; background: #fff; border-bottom: 1px solid #d8dde6;
                    padding: 12px 16px; z-index: 5; }
      main { padding: 72px 16px 400px; }
      .field { margin: 18px 0; }
      .field-label { font-size: 12px; color: #706e6b; }
      .field-value { font-size: 14px; }
      .scrollbox { height: 160px; overflow-y: auto; border: 1px solid #d8dde6; background: #fff; padding: 8px; }
      .spacer { height: 900px; }
    </style>
  </head>
  <body>
    <div class="global-header">Sticky global header</div>
    <div class="highlights">
      <div class="field">
        <span class="field-label">Account Name</span>
        <div class="field-value">Acme Corporation</div>
      </div>
    </div>
    <main>
      <div class="field"><span class="field-label">Industry</span><div class="field-value">Technology</div></div>
      <div class="field"><span class="field-label">Annual Revenue</span><div class="field-value">1.000.000</div></div>
      <div class="spacer"></div>
      <div class="field"><span class="field-label">Description</span><div class="field-value">Far down the page</div></div>
      <div class="scrollbox">
        <div style="height: 400px">
          <div class="field"><span class="field-label">Nested Field</span><div class="field-value">Inside a scroll container</div></div>
        </div>
      </div>
      <div class="spacer"></div>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
